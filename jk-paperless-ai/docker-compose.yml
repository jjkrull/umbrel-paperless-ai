version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: jk-paperless-ai_server_1
      APP_PORT: 3000

  server:
    image: clusterzx/paperless-ai:v3.0.9
    restart: on-failure
    environment:
      PUID: "1000"
      PGID: "1000"
      PAPERLESS_AI_PORT: "3000"
      RAG_SERVICE_URL: "http://localhost:8000"
      RAG_SERVICE_ENABLED: "true"
    volumes:
      - ${APP_DATA_DIR}/data:/app/data
