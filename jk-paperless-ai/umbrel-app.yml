description: >-
  Paperless-AI is an AI-powered extension for Paperless-ngx that brings
  automatic document classification, smart tagging, and semantic search
  using OpenAI-compatible APIs and Ollama.


  It enables fully automated document workflows, contextual chat, and
  powerful customization — all via an intuitive web interface.


  Features include automated document processing, RAG-based AI chat for
  natural language document search, manual processing via web interface,
  smart tagging with custom rules, and support for multiple AI providers
  including OpenAI, Ollama, DeepSeek, Google Gemini, and more.


  On first launch, a setup wizard will guide you through connecting to
  your Paperless-ngx instance and configuring your preferred AI provider.
